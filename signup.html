<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up – BioLoop AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="logo" style="text-align: center;width: 100%;">BioLoop AI</a>
    <h1>Sign up</h1>
    <p class="subtitle">Create an account to get started.</p>

    <form id="signup-form">
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required autocomplete="email" />
        <div class="form-error" id="signup-email-error" aria-live="polite"></div>
      </div>
      <div class="form-group">
        <label for="signup-role">Role</label>
        <select id="signup-role" name="role" required>
          <option value="FARM_MANAGER">Farm manager</option>
          <option value="INDUSTRY_MANAGER">Industry manager</option>
        </select>
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
        <div class="form-error" id="signup-password-error" aria-live="polite"></div>
      </div>
      <div class="form-group">
        <label for="signup-confirm">Confirm password</label>
        <input type="password" id="signup-confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password" />
        <div class="form-error" id="signup-confirm-error" aria-live="polite"></div>
      </div>
      <button type="submit" class="btn btn-primary">Sign up</button>
    </form>

    <p class="footer-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script type="module">
    import { initSignup } from './js/auth.js';
    initSignup();
  </script>
</body>
</html>

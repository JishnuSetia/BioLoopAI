<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in – BioLoop AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="logo" style="text-align: center;width:100%">BioLoop AI</a>
    <h1>Log in</h1>
    <p class="subtitle">Enter your credentials to access the dashboard.</p>

    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" required autocomplete="email" />
        <div class="form-error" id="login-email-error" aria-live="polite"></div>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        <div class="form-error" id="login-password-error" aria-live="polite"></div>
      </div>
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>

    <p class="footer-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

  <script type="module">
    import { initLogin } from './js/auth.js';
    initLogin();
  </script>
</body>
</html>
